# Full Stack — BioDockify Studio + Ollama + RTMP Relay for live streaming
# Usage: docker compose -f docker-compose.full.yml up -d
services:
  biodockifystudio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - ollama
      - rtmp-relay
      - recording-server
      - project-server

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  rtmp-relay:
    build: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped

  recording-server:
    build:
      context: ./server
      dockerfile: Dockerfile.recording
    ports:
      - "8081:8081"
    restart: unless-stopped
    volumes:
      - recordings:/recordings
      - proxies:/proxies
      - output:/output
      - projects:/projects
    environment:
      - PORT=8081
      - RECORDINGS_DIR=/recordings
      - PROXIES_DIR=/proxies
      - OUTPUT_DIR=/output
      - PROJECTS_DIR=/projects

  project-server:
    build:
      context: ./server
      dockerfile: Dockerfile.project
    ports:
      - "8082:8082"
    restart: unless-stopped
    volumes:
      - videos:/videos
      - proxies:/proxies
      - projects:/projects
      - output:/output
    environment:
      - PORT=8082
      - VIDEOS_DIR=/videos
      - PROXIES_DIR=/proxies
      - PROJECTS_DIR=/projects
      - OUTPUT_DIR=/output

volumes:
  ollama_data:
  recordings:
  proxies:
  output:
  projects:
  videos:
